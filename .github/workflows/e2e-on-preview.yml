# Runs the Playwright critical-path smoke against the Vercel preview URL
# for every pull request. Blocks merge on failure (configure branch
# protection separately).
#
# Required GitHub repo secrets:
#   TEST_USER_EMAIL            — Supabase test user email
#   TEST_USER_PASSWORD         — Supabase test user password
#   VERCEL_PROTECTION_BYPASS   — Vercel "Protection Bypass for Automation"
#                                token (Vercel project Settings → Deployment
#                                Protection). Lets CI bypass the auth wall
#                                on preview URLs.
#
# Scope notes:
#   - Desktop cross-browser tiered: chromium runs the full suite (incl.
#     OpenAI-backed dream-submission); firefox/webkit run all other specs.
#     Mobile/tablet projects exist in playwright.config.ts but are
#     intentionally excluded from CI pending separate work — see issue/PR
#     for mobile coverage.
#   - PR-only. Once preview is green and PR is merged, the prod build runs
#     the same code; a separate prod synthetic check belongs in another
#     workflow if/when desired.

name: E2E on Vercel Preview

on:
  pull_request:
    branches: [main]

# Cancel queued runs for the same PR when a new commit is pushed.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke (desktop cross-browser)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      # We can't use patrickedqvist/wait-for-vercel-preview here: it polls
      # the preview URL and fails fast on the 401 that Vercel Deployment
      # Protection serves. Instead, watch the GitHub deployments API for a
      # 'success' Preview deployment on this PR's head SHA, then verify
      # reachability with the bypass header.
      - name: Wait for Vercel preview deployment
        id: wait
        uses: actions/github-script@v7
        env:
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.payload.pull_request.head.sha;

            const timeoutMs = 10 * 60 * 1000;
            const intervalMs = 10 * 1000;
            const start = Date.now();
            let url = null;

            core.info(`Looking for Preview deployment for ${sha}`);

            while (Date.now() - start < timeoutMs) {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner, repo, sha, per_page: 50,
              });
              for (const d of deployments) {
                if (d.environment !== 'Preview') continue;
                const { data: statuses } = await github.rest.repos.listDeploymentStatuses({
                  owner, repo, deployment_id: d.id, per_page: 5,
                });
                const ready = statuses.find(
                  (s) => s.state === 'success' && s.environment_url,
                );
                if (ready) {
                  url = ready.environment_url;
                  break;
                }
                const failed = statuses.find((s) =>
                  ['failure', 'error'].includes(s.state),
                );
                if (failed) {
                  core.setFailed(`Preview deployment failed: ${failed.description ?? failed.state}`);
                  return;
                }
              }
              if (url) break;
              await new Promise((r) => setTimeout(r, intervalMs));
            }

            if (!url) {
              core.setFailed(`Timed out waiting for Preview deployment for ${sha}`);
              return;
            }

            // Verify the preview is reachable through the bypass header.
            // Without this we can't tell if the bypass secret is wrong vs.
            // the deployment genuinely being broken.
            const res = await fetch(url, {
              headers: { 'x-vercel-protection-bypass': process.env.VERCEL_PROTECTION_BYPASS },
              redirect: 'manual',
            });
            // 2xx or 3xx are fine; 401/403 means the bypass header didn't work.
            if (res.status === 401 || res.status === 403) {
              core.setFailed(
                `Preview returned ${res.status} with bypass header — VERCEL_PROTECTION_BYPASS may be wrong or expired.`,
              );
              return;
            }

            core.info(`Preview ready: ${url} (${res.status})`);
            core.setOutput('url', url);

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run E2E smoke against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.wait.outputs.url }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          # Forwarded so playwright.config.ts can attach the bypass header
          # to every request — otherwise navigating to the preview returns
          # 401 from Vercel Deployment Protection.
          VERCEL_PROTECTION_BYPASS: ${{ secrets.VERCEL_PROTECTION_BYPASS }}
          CI: "1"
        # dream-submission.spec.ts (OpenAI-backed) runs on chromium only;
        # all other specs run on firefox/webkit too. Mobile/tablet projects
        # exist in playwright.config.ts but are excluded here pending
        # separate work — see testIgnore in playwright.config.ts.
        run: npx playwright test --project=setup --project=chromium --project=firefox --project=webkit

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload Playwright test results (traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 7
