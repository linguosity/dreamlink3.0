# Runs the Playwright critical-path smoke against the Vercel preview URL
# for every pull request. Blocks merge on failure (configure branch
# protection separately).
#
# Required GitHub repo secrets:
#   TEST_USER_EMAIL    — Supabase test user email
#   TEST_USER_PASSWORD — Supabase test user password
#
# Scope notes:
#   - Chromium only. Firefox/WebKit/mobile are valuable but triple runtime;
#     add them by appending --project=<name> below once the chromium smoke
#     is stable.
#   - PR-only. Once preview is green and PR is merged, the prod build runs
#     the same code; a separate prod synthetic check belongs in another
#     workflow if/when desired.

name: E2E on Vercel Preview

on:
  pull_request:
    branches: [main]

# Cancel queued runs for the same PR when a new commit is pushed.
concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Playwright smoke (chromium)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Wait for Vercel preview deployment
        id: wait
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 600
          check_interval: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run E2E smoke against preview
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.wait.outputs.url }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          CI: "1"
        run: npx playwright test --project=setup --project=chromium

      - name: Upload Playwright HTML report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          retention-days: 7

      - name: Upload Playwright test results (traces, screenshots)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results
          retention-days: 7
