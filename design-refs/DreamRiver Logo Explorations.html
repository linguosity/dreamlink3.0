<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamRiver — Logo Explorations</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --warm-white: oklch(0.975 0.006 70);
    --warm-cream: oklch(0.955 0.015 75);
    --warm-paper: oklch(0.97 0.012 75);
    --warm-dark: oklch(0.22 0.02 250);
    --warm-darker: oklch(0.15 0.015 250);
    --warm-muted: oklch(0.55 0.02 250);
    --warm-line: oklch(0.88 0.01 75);
    --blue-deep: oklch(0.45 0.12 245);
    --blue-mid: oklch(0.55 0.14 240);
    --blue-soft: oklch(0.70 0.08 235);
    --gold: oklch(0.72 0.14 75);
    --gold-light: oklch(0.82 0.10 78);
    --amber: oklch(0.65 0.16 60);
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--warm-white);
    color: var(--warm-dark);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.005em;
  }
  .font-serif { font-family: 'DM Serif Display', Georgia, serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--warm-muted);
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* ────────────────────────────────────────────────────────────
   Marks — each direction is its own SVG component, drawn at
   the supplied size on viewBox 48×48.
   ──────────────────────────────────────────────────────────── */

// 00 — Current (deployed): Sun · Arch · River
function MarkArch({ size = 120, color = 'currentColor', stroke = 1.5 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      <circle cx="24" cy="8" r="1.8" fill={color} stroke="none" />
      <path d="M9 26 A15 15 0 0 1 39 26" />
      <line x1="9" y1="26" x2="9" y2="29" />
      <line x1="39" y1="26" x2="39" y2="29" />
      <path d="M5 33 Q13 30 20 33 T35 33 Q40 31 43 33" />
      <path d="M7 39 Q14 36 21 39 T36 39 Q40 37.5 41 39" />
    </svg>
  );
}

// 01 — Confluence: two streams meet, become one
function MarkConfluence({ size = 120, color = 'currentColor', stroke = 1.5 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      {/* left stream */}
      <path d="M10 6 Q18 16, 22 26 Q23 30, 24 32" />
      {/* right stream */}
      <path d="M38 6 Q30 16, 26 26 Q25 30, 24 32" />
      {/* unified stream descending */}
      <path d="M24 32 Q24 38, 22 44" />
      {/* meeting point */}
      <circle cx="24" cy="32" r="1.6" fill={color} stroke="none" />
    </svg>
  );
}

// 02 — Wellspring: still pool seen from above
function MarkWellspring({ size = 120, color = 'currentColor', stroke = 1.5 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      <circle cx="24" cy="24" r="16" />
      <circle cx="24" cy="24" r="9" />
      <circle cx="24" cy="24" r="2.5" fill={color} stroke="none" />
    </svg>
  );
}

// 03 — Stream: a single fluid line — the unbroken flow of revelation
function MarkStream({ size = 120, color = 'currentColor', stroke = 2.4 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      <path d="M4 22 C 12 12, 18 12, 24 22 C 30 32, 36 32, 44 22" />
      <path d="M4 32 C 12 22, 18 22, 24 32 C 30 42, 36 42, 44 32" strokeWidth={stroke * 0.55} opacity="0.55" />
    </svg>
  );
}

// 04 — Mandorla: the almond / vesica piscis with a still surface inside
function MarkMandorla({ size = 120, color = 'currentColor', stroke = 1.5 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      {/* almond / vesica */}
      <path d="M24 6 C 36 14, 36 34, 24 42 C 12 34, 12 14, 24 6 Z" />
      {/* inner light dot */}
      <circle cx="24" cy="20" r="1.4" fill={color} stroke="none" />
      {/* still surface inside */}
      <path d="M17 27 Q21 28.4, 24 27 T31 27" strokeWidth={stroke * 0.85} />
      <path d="M18 31 Q21.5 32, 24 31 T30 31" strokeWidth={stroke * 0.7} opacity="0.7" />
    </svg>
  );
}

// 05 — Crescent: a single dim crescent — moon over still water / river bend
function MarkCrescent({ size = 120, color = 'currentColor', stroke = 1.5 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      {/* full crescent — outer arc, inner arc */}
      <path d="M24 6 A18 18 0 1 0 24 42 A13 18 0 1 1 24 6 Z" fill={color} stroke="none" />
      {/* reflection ripples below */}
      <path d="M8 44 Q16 41.5, 24 44 T40 44" stroke={color} strokeWidth={1.2} opacity="0.55" />
    </svg>
  );
}

/* ────────────────────────────────────────────────────────────
   Direction card — one artboard's worth of content
   ──────────────────────────────────────────────────────────── */
function DirectionCard({ number, name, concept, MarkComp, badge, bg = 'oklch(0.97 0.012 75)', markColor = 'var(--warm-darker)' }) {
  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'white',
      display: 'flex', flexDirection: 'column',
      fontFamily: "'DM Sans', system-ui, sans-serif",
      color: 'var(--warm-dark)',
    }}>
      {/* hero panel */}
      <div style={{
        background: bg,
        flex: '0 0 220px',
        position: 'relative',
        display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        borderBottom: '1px solid var(--warm-line)',
      }}>
        <MarkComp size={130} color={markColor} />
        {badge && (
          <div className="font-mono" style={{
            position: 'absolute', top: 12, right: 12,
            fontSize: 9, letterSpacing: '0.14em', textTransform: 'uppercase',
            color: 'var(--blue-deep)',
            background: 'oklch(1 0 0 / 0.75)',
            padding: '3px 8px', borderRadius: 100,
            border: '1px solid oklch(0.86 0.04 245)',
          }}>{badge}</div>
        )}
        <div className="font-mono" style={{
          position: 'absolute', bottom: 10, left: 14,
          fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase',
          color: 'var(--warm-muted)', opacity: 0.7,
        }}>{number}</div>
      </div>

      {/* lockup */}
      <div style={{
        padding: '20px 24px 14px',
        display: 'flex', alignItems: 'center', gap: 10,
        borderBottom: '1px dashed var(--warm-line)',
      }}>
        <MarkComp size={24} color="var(--warm-darker)" stroke={1.7} />
        <span className="wordmark" style={{ fontSize: 24, color: 'var(--warm-darker)', lineHeight: 1 }}>
          DreamRiver
        </span>
      </div>

      {/* name + concept */}
      <div style={{ padding: '14px 24px 4px' }}>
        <div className="font-serif" style={{
          fontSize: 22, lineHeight: 1.1,
          color: 'var(--warm-darker)', marginBottom: 8,
        }}>{name}</div>
        <p style={{
          fontSize: 12.5, lineHeight: 1.5,
          color: 'var(--warm-muted)',
          textWrap: 'pretty',
        }}>{concept}</p>
      </div>

      {/* size scale */}
      <div style={{ marginTop: 'auto', padding: '14px 24px 20px', display: 'flex', alignItems: 'flex-end', gap: 16 }}>
        {[48, 32, 22, 16].map(s => (
          <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
            <MarkComp size={s} color="var(--warm-darker)" stroke={s < 24 ? 2 : 1.5} />
            <div className="font-mono" style={{ fontSize: 9, color: 'var(--warm-muted)' }}>{s}</div>
          </div>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          {/* app icon */}
          <div style={{
            width: 36, height: 36, borderRadius: 9,
            background: 'var(--blue-deep)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <MarkComp size={22} color="white" stroke={1.8} />
          </div>
          <div className="font-mono" style={{ fontSize: 9, color: 'var(--warm-muted)' }}>app</div>
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   Special: Pure Wordmark direction (no figurative mark)
   ──────────────────────────────────────────────────────────── */
function PureWordmarkCard() {
  return (
    <div style={{ width: '100%', height: '100%', background: 'white', display: 'flex', flexDirection: 'column' }}>
      <div style={{
        background: 'oklch(0.97 0.012 75)',
        flex: '0 0 220px',
        position: 'relative',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        borderBottom: '1px solid var(--warm-line)',
      }}>
        {/* hairline rules above & below */}
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 140, height: 1, background: 'var(--warm-darker)' }} />
          <span className="wordmark" style={{ fontSize: 56, color: 'var(--warm-darker)', lineHeight: 1 }}>
            DreamRiver
          </span>
          <div className="font-mono" style={{
            fontSize: 9.5, letterSpacing: '0.32em', textTransform: 'uppercase',
            color: 'var(--warm-muted)',
          }}>Dreams · Scripture</div>
          <div style={{ width: 140, height: 1, background: 'var(--warm-darker)' }} />
        </div>
        <div className="font-mono" style={{
          position: 'absolute', bottom: 10, left: 14,
          fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase',
          color: 'var(--warm-muted)', opacity: 0.7,
        }}>06</div>
      </div>

      <div style={{
        padding: '20px 24px 14px',
        borderBottom: '1px dashed var(--warm-line)',
        display: 'flex', alignItems: 'baseline', gap: 8,
      }}>
        <span className="wordmark" style={{ fontSize: 28, color: 'var(--warm-darker)', lineHeight: 1 }}>
          Dream
        </span>
        <span style={{
          width: 4, height: 4, borderRadius: '50%',
          background: 'var(--gold)',
          alignSelf: 'center',
        }} />
        <span className="wordmark" style={{ fontSize: 28, color: 'var(--warm-darker)', lineHeight: 1, fontStyle: 'normal', fontWeight: 600 }}>
          River
        </span>
      </div>

      <div style={{ padding: '14px 24px 4px' }}>
        <div className="font-serif" style={{ fontSize: 22, lineHeight: 1.1, color: 'var(--warm-darker)', marginBottom: 8 }}>
          Pure Wordmark
        </div>
        <p style={{ fontSize: 12.5, lineHeight: 1.5, color: 'var(--warm-muted)', textWrap: 'pretty' }}>
          No figurative mark. The name does all the work, set in italic on the left, roman on the right, hinged by a small gold mediant. Reads like a literary imprint.
        </p>
      </div>

      <div style={{ marginTop: 'auto', padding: '14px 24px 20px' }}>
        <div className="font-mono" style={{ fontSize: 10, color: 'var(--warm-muted)', marginBottom: 8, letterSpacing: '0.1em', textTransform: 'uppercase' }}>Sizes</div>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 18, flexWrap: 'wrap' }}>
          <span className="wordmark" style={{ fontSize: 32, color: 'var(--warm-darker)' }}>DreamRiver</span>
          <span className="wordmark" style={{ fontSize: 20, color: 'var(--warm-darker)' }}>DreamRiver</span>
          <span className="wordmark" style={{ fontSize: 13, color: 'var(--warm-darker)' }}>DreamRiver</span>
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   Special: Monogram / Colophon
   ──────────────────────────────────────────────────────────── */
function MonogramCard() {
  return (
    <div style={{ width: '100%', height: '100%', background: 'white', display: 'flex', flexDirection: 'column' }}>
      <div style={{
        background: 'oklch(0.97 0.012 75)',
        flex: '0 0 220px',
        position: 'relative',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
        borderBottom: '1px solid var(--warm-line)',
      }}>
        {/* circular colophon */}
        <div style={{
          width: 132, height: 132, borderRadius: '50%',
          border: '1.5px solid var(--warm-darker)',
          display: 'flex', flexDirection: 'column',
          alignItems: 'center', justifyContent: 'center',
          position: 'relative',
        }}>
          <span className="wordmark" style={{
            fontSize: 64, color: 'var(--warm-darker)', lineHeight: 1,
            marginTop: -10,
            fontWeight: 600,
          }}>D</span>
          {/* ripple under D */}
          <svg width="62" height="14" viewBox="0 0 62 14" fill="none"
               stroke="var(--warm-darker)" strokeWidth={1.4} strokeLinecap="round"
               style={{ marginTop: 4 }}>
            <path d="M2 5 Q11 1, 20 5 T38 5 Q48 1, 56 5 L60 5" />
            <path d="M4 11 Q12 8, 20 11 T38 11 Q48 8, 56 11" opacity="0.6" />
          </svg>
          {/* tiny stars on the ring */}
          <span style={{ position: 'absolute', top: 12, left: '50%', transform: 'translateX(-50%)', fontSize: 8, color: 'var(--warm-muted)' }}>✦</span>
          <span style={{ position: 'absolute', bottom: 12, left: '50%', transform: 'translateX(-50%)', fontSize: 8, color: 'var(--warm-muted)' }}>✦</span>
        </div>
        <div className="font-mono" style={{
          position: 'absolute', bottom: 10, left: 14,
          fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase',
          color: 'var(--warm-muted)', opacity: 0.7,
        }}>07</div>
      </div>

      <div style={{
        padding: '20px 24px 14px',
        display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: '1px dashed var(--warm-line)',
      }}>
        <div style={{
          width: 28, height: 28, borderRadius: '50%',
          border: '1.2px solid var(--warm-darker)',
          display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <span className="wordmark" style={{ fontSize: 16, color: 'var(--warm-darker)', lineHeight: 1, fontWeight: 600 }}>D</span>
        </div>
        <span className="wordmark" style={{ fontSize: 24, color: 'var(--warm-darker)', lineHeight: 1 }}>
          DreamRiver
        </span>
      </div>

      <div style={{ padding: '14px 24px 4px' }}>
        <div className="font-serif" style={{ fontSize: 22, lineHeight: 1.1, color: 'var(--warm-darker)', marginBottom: 8 }}>
          Colophon Monogram
        </div>
        <p style={{ fontSize: 12.5, lineHeight: 1.5, color: 'var(--warm-muted)', textWrap: 'pretty' }}>
          A roundel in the tradition of publishing-house marks — an initial sitting above a ripple, framed by a ring. Treats the brand as a press, an imprint, a stamp inside the back cover.
        </p>
      </div>

      <div style={{ marginTop: 'auto', padding: '14px 24px 20px', display: 'flex', alignItems: 'flex-end', gap: 16 }}>
        {[44, 28, 20].map(s => (
          <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
            <div style={{
              width: s, height: s, borderRadius: '50%',
              border: `${s < 24 ? 1 : 1.2}px solid var(--warm-darker)`,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span className="wordmark" style={{ fontSize: s * 0.55, color: 'var(--warm-darker)', lineHeight: 1, fontWeight: 600 }}>D</span>
            </div>
            <div className="font-mono" style={{ fontSize: 9, color: 'var(--warm-muted)' }}>{s}</div>
          </div>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{
            width: 36, height: 36, borderRadius: 9,
            background: 'var(--blue-deep)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>
            <div style={{
              width: 26, height: 26, borderRadius: '50%',
              border: '1.2px solid white',
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>
              <span className="wordmark" style={{ fontSize: 14, color: 'white', lineHeight: 1, fontWeight: 600 }}>D</span>
            </div>
          </div>
          <div className="font-mono" style={{ fontSize: 9, color: 'var(--warm-muted)' }}>app</div>
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   Concept brief — top card
   ──────────────────────────────────────────────────────────── */
function ConceptBrief() {
  return (
    <div style={{
      width: '100%', height: '100%',
      padding: 32,
      background: 'linear-gradient(160deg, oklch(0.97 0.012 75) 0%, oklch(0.93 0.025 230) 100%)',
      display: 'flex', flexDirection: 'column', gap: 14,
      fontFamily: "'DM Sans', sans-serif",
      color: 'var(--warm-dark)',
      borderRadius: 0,
    }}>
      <div className="eyebrow">Brief · 6 directions</div>
      <h2 className="font-serif" style={{
        fontSize: 30, lineHeight: 1.08, color: 'var(--warm-darker)',
        fontWeight: 400, textWrap: 'balance',
      }}>
        Logos rooted in the concept — not in any one line of copy.
      </h2>
      <p style={{ fontSize: 13.5, lineHeight: 1.6, color: 'var(--warm-muted)', textWrap: 'pretty' }}>
        The concept: <em>DreamRiver is a continuous flow of revelation.</em> Dreams are water — drawn from somewhere, carrying meaning to somewhere. Each direction below pulls on one strand of that idea: confluence, source, flow, sanctuary, light, lineage.
      </p>
      <div style={{ marginTop: 8, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, fontSize: 12 }}>
        <div style={{ color: 'var(--warm-muted)' }}>
          <span className="font-mono" style={{ color: 'var(--warm-dark)' }}>01 </span> Confluence — two streams join
        </div>
        <div style={{ color: 'var(--warm-muted)' }}>
          <span className="font-mono" style={{ color: 'var(--warm-dark)' }}>04 </span> Mandorla — sanctuary, threshold
        </div>
        <div style={{ color: 'var(--warm-muted)' }}>
          <span className="font-mono" style={{ color: 'var(--warm-dark)' }}>02 </span> Wellspring — source, stillness
        </div>
        <div style={{ color: 'var(--warm-muted)' }}>
          <span className="font-mono" style={{ color: 'var(--warm-dark)' }}>05 </span> Crescent — night, reflection
        </div>
        <div style={{ color: 'var(--warm-muted)' }}>
          <span className="font-mono" style={{ color: 'var(--warm-dark)' }}>03 </span> Stream — unbroken flow
        </div>
        <div style={{ color: 'var(--warm-muted)' }}>
          <span className="font-mono" style={{ color: 'var(--warm-dark)' }}>06 </span> Monogram — colophon stamp
        </div>
      </div>
      <div style={{
        marginTop: 'auto', paddingTop: 14,
        borderTop: '1px solid oklch(0.85 0.02 235 / 0.5)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        fontSize: 11, color: 'var(--warm-muted)',
      }}>
        <span>Same wordmark · Cormorant Garamond italic 500</span>
        <span className="font-mono" style={{ letterSpacing: '0.12em', textTransform: 'uppercase' }}>Round 2</span>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   App
   ──────────────────────────────────────────────────────────── */
function App() {
  const cardW = 340;
  const cardH = 560;

  return (
    <DesignCanvas>
      <DCSection id="brief" title="DreamRiver · Logo Directions" subtitle="6 conceptual marks, all paired with the Cormorant Garamond italic wordmark">
        <DCArtboard id="brief-card" label="Brief" width={460} height={cardH}>
          <ConceptBrief />
        </DCArtboard>
        <DCArtboard id="current" label="Current · Sun-Arch (deployed)" width={cardW} height={cardH}>
          <DirectionCard
            number="00 · Current"
            name="Sun · Arch · River"
            concept="The mark deployed across the site today — derived from the splash copy “a bridge over a river of golden light.” Including it here as the baseline to compare against."
            MarkComp={MarkArch}
            badge="Deployed"
            bg="oklch(0.96 0.018 245)"
          />
        </DCArtboard>
      </DCSection>

      <DCSection id="conceptual" title="Conceptual marks" subtitle="Pictorial — each draws from a different facet of the concept">
        <DCArtboard id="confluence" label="01 · Confluence" width={cardW} height={cardH}>
          <DirectionCard
            number="01"
            name="Confluence"
            concept="Dream and Word descend from separate springs and meet — becoming one stream that flows into the user. The small dot marks the moment they join. Visually distinct at any size; reads as “two becoming one.”"
            MarkComp={MarkConfluence}
            bg="oklch(0.97 0.015 230)"
          />
        </DCArtboard>
        <DCArtboard id="wellspring" label="02 · Wellspring" width={cardW} height={cardH}>
          <DirectionCard
            number="02"
            name="Wellspring"
            concept="Concentric rings around a single point — the still pool seen from above. Drawn from Jeremiah's “fountain of living waters,” Psalm 36's “fountain of life.” The dot is the source; the rings are everything it touches."
            MarkComp={MarkWellspring}
            bg="oklch(0.96 0.025 75)"
          />
        </DCArtboard>
        <DCArtboard id="stream" label="03 · Stream" width={cardW} height={cardH}>
          <DirectionCard
            number="03"
            name="Stream"
            concept="A single fluid line — the unbroken flow of revelation across nights, across lifetimes. The second wave is a quieter echo, suggesting depth. Minimal, abstract, almost a calligraphic gesture."
            MarkComp={MarkStream}
            bg="oklch(0.97 0.015 230)"
          />
        </DCArtboard>
        <DCArtboard id="mandorla" label="04 · Mandorla" width={cardW} height={cardH}>
          <DirectionCard
            number="04"
            name="Mandorla"
            concept="The vesica piscis — sacred geometry, the almond-shaped space where two worlds overlap in Christian iconography. Holds a still inner surface and a single point of light. The threshold where the dreamer meets the Word."
            MarkComp={MarkMandorla}
            bg="oklch(0.96 0.02 75)"
          />
        </DCArtboard>
        <DCArtboard id="crescent" label="05 · Crescent" width={cardW} height={cardH}>
          <DirectionCard
            number="05"
            name="Crescent"
            concept="The simplest possible form — a single filled crescent. Reads as moon (night, dream), as river bend (cartographic), as a vessel. Solid weight gives it presence at favicon scale where line marks fall apart."
            MarkComp={MarkCrescent}
            bg="oklch(0.18 0.02 250)"
            markColor="oklch(0.92 0.04 75)"
          />
        </DCArtboard>
      </DCSection>

      <DCSection id="typographic" title="Typographic systems" subtitle="No figurative mark — the brand lives in the wordmark itself">
        <DCArtboard id="pure-wordmark" label="06 · Pure Wordmark" width={cardW} height={cardH}>
          <PureWordmarkCard />
        </DCArtboard>
        <DCArtboard id="monogram" label="07 · Colophon Monogram" width={cardW} height={cardH}>
          <MonogramCard />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
