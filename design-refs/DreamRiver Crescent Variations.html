<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamRiver — Crescent Variations</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --warm-white: oklch(0.975 0.006 70);
    --warm-cream: oklch(0.955 0.015 75);
    --warm-paper: oklch(0.97 0.012 75);
    --warm-dark: oklch(0.22 0.02 250);
    --warm-darker: oklch(0.15 0.015 250);
    --warm-muted: oklch(0.55 0.02 250);
    --warm-line: oklch(0.88 0.01 75);
    --night: oklch(0.18 0.02 250);
    --night-deep: oklch(0.12 0.015 250);
    --blue-deep: oklch(0.45 0.12 245);
    --gold: oklch(0.72 0.14 75);
    --gold-light: oklch(0.82 0.10 78);
    --parchment: oklch(0.93 0.025 75);
    --amber: oklch(0.65 0.16 60);
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--warm-white);
    color: var(--warm-dark);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.005em;
  }
  .font-serif { font-family: 'DM Serif Display', Georgia, serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--warm-muted);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">
const { useState } = React;

/* ────────────────────────────────────────────────────────────
   Crescent variations — eight directions on the same form.
   Every mark sized to a 48×48 viewBox.
   `fill` controls the crescent body color; `stroke` is used
   when the mark is outlined or has secondary geometry.
   ──────────────────────────────────────────────────────────── */

// Base crescent path (waxing, opens right) — used as a building block
const CRESCENT_PATH = "M24 6 A18 18 0 1 0 24 42 A13 18 0 1 1 24 6 Z";

// 01 — Original Riverbend: filled crescent + reflection ripple
function V01Riverbend({ size = 130, fill = 'var(--parchment)', accent = 'var(--warm-muted)' }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <path d={CRESCENT_PATH} fill={fill} />
      <path d="M8 44 Q16 41.5, 24 44 T40 44" stroke={accent} strokeWidth={1.2}
            strokeLinecap="round" opacity="0.6" />
    </svg>
  );
}

// 02 — Reflected: crescent + its mirror reflection in water
function V02Reflected({ size = 130, fill = 'var(--parchment)', accent = 'var(--warm-muted)' }) {
  // top crescent uses a slightly tighter path so we can fit the reflection
  // beneath it. matrix(1 0 0 -1 0 64) flips vertically across y=32.
  const path = "M24 4 A13 13 0 1 0 24 28 A9 13 0 1 1 24 4 Z";
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <path d={path} fill={fill} />
      {/* water surface */}
      <line x1="4" y1="32" x2="44" y2="32" stroke={accent} strokeWidth={0.8} opacity="0.55" />
      {/* reflection — flipped + faded */}
      <g transform="matrix(1 0 0 -1 0 64)">
        <path d={path} fill={fill} opacity="0.28" />
      </g>
      {/* gentle ripple distortion lines on water */}
      <path d="M6 36 Q16 35, 24 36 T42 36" stroke={accent} strokeWidth={0.7} opacity="0.35" />
    </svg>
  );
}

// 03 — Magus: crescent + a small filled star/dot in its opening
function V03Magus({ size = 130, fill = 'var(--parchment)', accent = 'var(--gold-light)' }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <path d={CRESCENT_PATH} fill={fill} />
      {/* small star/dot to the right of the crescent's inner curve */}
      <circle cx="33" cy="22" r="1.7" fill={accent} />
    </svg>
  );
}

// 04 — Vessel: crescent rotated 90° — horns up, reads as boat/bowl
function V04Vessel({ size = 130, fill = 'var(--parchment)', accent = 'var(--warm-muted)' }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <g transform="rotate(-90 24 24)">
        <path d={CRESCENT_PATH} fill={fill} />
      </g>
      {/* a small dot of light above the vessel */}
      <circle cx="24" cy="6" r="1.5" fill={accent} />
    </svg>
  );
}

// 05 — Hollow: outline only, no fill — letterform-adjacent
function V05Hollow({ size = 130, fill = 'var(--parchment)', accent = 'var(--parchment)' }) {
  // open crescent built from two arc curves rather than a closed shape
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={fill} strokeWidth={2.2} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible' }}>
      {/* outer arc */}
      <path d="M30 7 A18 18 0 1 0 30 41" />
      {/* inner arc */}
      <path d="M30 11 A14 14 0 1 1 30 37" />
    </svg>
  );
}

// 06 — Roundel: crescent set within a thin disk — full-moon outline
function V06Roundel({ size = 130, fill = 'var(--parchment)', accent = 'var(--parchment)' }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <circle cx="24" cy="24" r="18" stroke={accent} strokeWidth={0.9}
              strokeDasharray="0.5 2" opacity="0.5" />
      <path d="M24 8 A16 16 0 1 0 24 40 A11.5 16 0 1 1 24 8 Z" fill={fill} />
    </svg>
  );
}

// 07 — Phase: three small crescents — waxing · full · waning
function V07Phase({ size = 130, fill = 'var(--parchment)', accent = 'var(--warm-muted)' }) {
  // each glyph drawn inside a 14x28 cell, in a row
  const cellH = 28;
  return (
    <svg viewBox="0 0 60 30" width={size} height={size * 30 / 60} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      {/* waxing — opens right */}
      <path d="M10 4 A11 11 0 1 0 10 26 A8 11 0 1 1 10 4 Z" fill={fill} />
      {/* full disk */}
      <circle cx="30" cy="15" r="10.5" fill={fill} />
      {/* waning — opens left (mirror of waxing) */}
      <g transform="translate(50 0) scale(-1 1) translate(-10 0)">
        <path d="M10 4 A11 11 0 1 0 10 26 A8 11 0 1 1 10 4 Z" fill={fill} />
      </g>
    </svg>
  );
}

// 08 — Slim: very thin crescent — minimal, modern, like a calligraphic sliver
function V08Slim({ size = 130, fill = 'var(--parchment)', accent = 'var(--parchment)' }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <path d="M24 4 A20 20 0 1 0 24 44 A17 20 0 1 1 24 4 Z" fill={fill} />
    </svg>
  );
}

/* ────────────────────────────────────────────────────────────
   Direction card
   ──────────────────────────────────────────────────────────── */
function VariationCard({ number, name, concept, Mark, hero = {}, lockupOnDark = false }) {
  const heroOpts = {
    bg: 'var(--night)',
    fill: 'var(--parchment)',
    accent: 'var(--warm-muted)',
    ...hero,
  };
  return (
    <div style={{
      width: '100%', height: '100%',
      background: 'white',
      display: 'flex', flexDirection: 'column',
      color: 'var(--warm-dark)',
    }}>
      {/* hero panel */}
      <div style={{
        background: heroOpts.bg,
        flex: '0 0 240px',
        position: 'relative',
        display: 'flex',
        alignItems: 'center', justifyContent: 'center',
        borderBottom: '1px solid var(--warm-line)',
      }}>
        <Mark size={150} fill={heroOpts.fill} accent={heroOpts.accent} />
        <div className="font-mono" style={{
          position: 'absolute', bottom: 12, left: 16,
          fontSize: 10, letterSpacing: '0.16em', textTransform: 'uppercase',
          color: 'oklch(0.65 0.04 245 / 0.7)',
        }}>{number}</div>
      </div>

      {/* lockup */}
      <div style={{
        padding: '20px 24px 14px',
        display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: '1px dashed var(--warm-line)',
      }}>
        <Mark size={28} fill="var(--warm-darker)" accent="var(--warm-muted)" />
        <span className="wordmark" style={{ fontSize: 26, color: 'var(--warm-darker)', lineHeight: 1 }}>
          DreamRiver
        </span>
      </div>

      {/* name + concept */}
      <div style={{ padding: '14px 24px 4px' }}>
        <div className="font-serif" style={{
          fontSize: 22, lineHeight: 1.1,
          color: 'var(--warm-darker)', marginBottom: 8,
        }}>{name}</div>
        <p style={{
          fontSize: 12.5, lineHeight: 1.55,
          color: 'var(--warm-muted)',
          textWrap: 'pretty',
        }}>{concept}</p>
      </div>

      {/* size scale + app icon */}
      <div style={{ marginTop: 'auto', padding: '14px 24px 22px', display: 'flex', alignItems: 'flex-end', gap: 14 }}>
        {[40, 28, 20, 14].map(s => (
          <div key={s} style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
            <Mark size={s} fill="var(--warm-darker)" accent="var(--warm-muted)" />
            <div className="font-mono" style={{ fontSize: 9, color: 'var(--warm-muted)' }}>{s}</div>
          </div>
        ))}
        <div style={{ marginLeft: 'auto', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 5 }}>
          <div style={{
            width: 40, height: 40, borderRadius: 10,
            background: 'var(--night)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 2px 6px oklch(0.18 0.02 250 / 0.25)',
          }}>
            <Mark size={26} fill="var(--parchment)" accent="oklch(0.5 0.02 250)" />
          </div>
          <div className="font-mono" style={{ fontSize: 9, color: 'var(--warm-muted)' }}>app</div>
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   Brief card
   ──────────────────────────────────────────────────────────── */
function Brief() {
  return (
    <div style={{
      width: '100%', height: '100%',
      padding: 32,
      background: 'linear-gradient(165deg, var(--night) 0%, var(--night-deep) 100%)',
      display: 'flex', flexDirection: 'column', gap: 14,
      color: 'var(--parchment)',
      position: 'relative', overflow: 'hidden',
    }}>
      {/* hero crescent in corner */}
      <div style={{ position: 'absolute', top: -28, right: -28, opacity: 0.18 }}>
        <V01Riverbend size={220} fill="var(--parchment)" accent="transparent" />
      </div>

      <div style={{ position: 'relative', zIndex: 1, display: 'flex', flexDirection: 'column', height: '100%' }}>
        <div className="eyebrow" style={{ color: 'oklch(0.7 0.06 75)' }}>Round 3 · Selected direction</div>
        <h2 className="font-serif" style={{
          fontSize: 30, lineHeight: 1.08, color: 'var(--parchment)',
          fontWeight: 400, textWrap: 'balance',
          marginTop: 14, marginBottom: 16,
        }}>
          Eight ways to bend the same crescent.
        </h2>
        <p style={{ fontSize: 13.5, lineHeight: 1.6, color: 'oklch(0.78 0.025 75)', textWrap: 'pretty' }}>
          You picked the crescent — solid weight, scales tiny, reads as moon and river bend simultaneously. These variations push on what the crescent <em>is doing</em>: alone vs. reflected, filled vs. hollow, vertical vs. vessel, single vs. phased, with or without a companion glyph.
        </p>

        <div style={{ marginTop: 18, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, fontSize: 12 }}>
          {[
            ['01', 'Riverbend', 'original'],
            ['05', 'Hollow', 'outline'],
            ['02', 'Reflected', 'mirror'],
            ['06', 'Roundel', 'phase ring'],
            ['03', 'Magus', '+ star'],
            ['07', 'Phase', 'triptych'],
            ['04', 'Vessel', 'horns up'],
            ['08', 'Slim', 'thin sliver'],
          ].map(([n, name, sub]) => (
            <div key={n} style={{ color: 'oklch(0.72 0.03 75)', display: 'flex', alignItems: 'baseline', gap: 8 }}>
              <span className="font-mono" style={{ color: 'oklch(0.8 0.06 75)', fontSize: 11 }}>{n}</span>
              <span style={{ color: 'var(--parchment)' }}>{name}</span>
              <span style={{ fontSize: 11, opacity: 0.6 }}>{sub}</span>
            </div>
          ))}
        </div>

        <div style={{
          marginTop: 'auto', paddingTop: 14,
          borderTop: '1px solid oklch(0.4 0.04 250 / 0.5)',
          display: 'flex', justifyContent: 'space-between', alignItems: 'center',
          fontSize: 11, color: 'oklch(0.65 0.03 75)',
        }}>
          <span>Same wordmark · Cormorant Garamond italic 500</span>
          <span className="font-mono" style={{ letterSpacing: '0.12em', textTransform: 'uppercase' }}>Crescent · v3</span>
        </div>
      </div>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   App
   ──────────────────────────────────────────────────────────── */
function App() {
  const cardW = 340;
  const cardH = 560;

  return (
    <DesignCanvas>
      <DCSection id="brief" title="Crescent · 8 variations" subtitle="Same selected form, pushed in different directions">
        <DCArtboard id="brief" label="Brief" width={460} height={cardH}>
          <Brief />
        </DCArtboard>
      </DCSection>

      <DCSection id="figurative" title="The crescent, in different postures" subtitle="Solid · reflected · companion star · rotated · phased">
        <DCArtboard id="v01" label="01 · Riverbend" width={cardW} height={cardH}>
          <VariationCard
            number="01 · Riverbend"
            name="Riverbend"
            concept="The picked direction, kept honest — a single filled waxing crescent with one quiet ripple line for the river. The ripple grounds the moon as a reflection rather than just a celestial body."
            Mark={V01Riverbend}
          />
        </DCArtboard>
        <DCArtboard id="v02" label="02 · Reflected" width={cardW} height={cardH}>
          <VariationCard
            number="02 · Reflected"
            name="Reflected"
            concept="The crescent above the water; its mirror image below, faded. The horizon line between them is the surface — the place where dream and waking meet. Most evocative; needs ~24px to read."
            Mark={V02Reflected}
          />
        </DCArtboard>
        <DCArtboard id="v03" label="03 · Magus" width={cardW} height={cardH}>
          <VariationCard
            number="03 · Magus"
            name="Magus"
            concept="The crescent paired with a single star in its opening. Reads as star-and-moon (the Magi following the sign, the dream Joseph received). Adds a gold point of light — the brand's second color earns its keep."
            Mark={V03Magus}
          />
        </DCArtboard>
        <DCArtboard id="v04" label="04 · Vessel" width={cardW} height={cardH}>
          <VariationCard
            number="04 · Vessel"
            name="Vessel"
            concept="The crescent rotated 90°, horns up — now a bowl, a boat, an ark. The small dot above is a star to navigate by. Reads less as moon and more as a vessel for what the dream carries."
            Mark={V04Vessel}
          />
        </DCArtboard>
        <DCArtboard id="v05" label="05 · Hollow" width={cardW} height={cardH}>
          <VariationCard
            number="05 · Hollow"
            name="Hollow"
            concept="Outline-only. Becomes letterform-adjacent — almost a calligraphic “C.” Lighter on the page, pairs more elegantly with the Cormorant wordmark at large display sizes. Loses presence at 14px and below."
            Mark={V05Hollow}
          />
        </DCArtboard>
        <DCArtboard id="v06" label="06 · Roundel" width={cardW} height={cardH}>
          <VariationCard
            number="06 · Roundel"
            name="Roundel"
            concept="The filled crescent inset within the dotted outline of the full disk. Suggests phase — what is illuminated and what is not yet. The dotted ring is a quiet badge, like a stamp's outer edge."
            Mark={V06Roundel}
          />
        </DCArtboard>
        <DCArtboard id="v07" label="07 · Phase" width={cardW} height={cardH}>
          <VariationCard
            number="07 · Phase"
            name="Phase"
            concept="Three crescents in a row: waxing, full, waning. The cycle of nights, the seasons of revelation. Doesn't work as a square favicon, but powerful as a horizontal lockup (footer rule, email banner, app launch screen)."
            Mark={V07Phase}
          />
        </DCArtboard>
        <DCArtboard id="v08" label="08 · Slim" width={cardW} height={cardH}>
          <VariationCard
            number="08 · Slim"
            name="Slim"
            concept="The same crescent, narrower — a true sliver. Reads first as moon, second as river bend. The thinness gives it the feel of a new moon — the beginning, just-visible. Pairs naturally with light-weight typography."
            Mark={V08Slim}
          />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>

</body>
</html>
