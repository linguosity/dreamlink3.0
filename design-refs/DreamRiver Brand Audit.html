<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DreamRiver — Brand Audit · v2 Moonwater rollout</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --night:        #0e1a30;
    --night-deep:   #08111f;
    --night-soft:   #1a2748;
    --cream:        #f5ecd6;
    --cream-soft:   #faf4e2;
    --gold:         #d4a247;
    --gold-deep:    #b08436;
    --gold-light:   #e6c073;

    --warm-white:   oklch(0.975 0.006 70);
    --warm-paper:   oklch(0.97 0.012 75);
    --warm-cream:   oklch(0.955 0.015 75);
    --warm-line:    oklch(0.88 0.01 75);
    --warm-dark:    oklch(0.22 0.02 250);
    --warm-darker:  oklch(0.15 0.015 250);
    --warm-muted:   oklch(0.55 0.02 250);

    /* old palette being phased out */
    --old-blue:     oklch(0.45 0.12 245);
    --old-blue-pale: oklch(0.92 0.03 245);

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--warm-white);
    color: var(--warm-darker);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.55;
  }

  .wordmark {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 500;
    letter-spacing: 0.005em;
  }
  .font-serif { font-family: 'DM Serif Display', Georgia, serif; }
  .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }

  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--warm-muted);
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState } = React;

/* ── The Moonwater mark — same component as Brand.html ─────── */
function MoonwaterMark({ size = 64, moonColor = 'var(--gold)', waveTop = 'var(--cream)', waveBottom = 'var(--gold)', stroke = 2.5, fullness = 9, tilt = 15, invertWaves = false }) {
  const crescent = `M32 11 A14 14 0 1 0 32 39 A${fullness} 14 0 1 1 32 11 Z`;
  const sw = Math.max(1.4, Math.min(3.2, (stroke * size) / 80));
  const top = "M10 48 C 18 42, 22 42, 30 48 C 38 54, 42 54, 54 48";
  const bottom = invertWaves
    ? "M14 56 C 22 62, 26 62, 32 56 C 38 50, 42 50, 50 56"
    : "M14 56 C 22 50, 26 50, 32 56 C 38 62, 42 62, 50 56";
  return (
    <svg viewBox="0 0 64 64" width={size} height={size} fill="none" style={{ display: 'block', overflow: 'visible' }}>
      <g transform={`rotate(${tilt} 32 25)`}>
        <path d={crescent} fill={moonColor} />
      </g>
      <path d={bottom} stroke={waveBottom} strokeWidth={sw} strokeLinecap="round" />
      <path d={top}    stroke={waveTop}    strokeWidth={sw} strokeLinecap="round" />
    </svg>
  );
}

function AppIcon({ size = 64, radius = 22, bg = 'var(--night)', children }) {
  return (
    <div style={{
      width: size, height: size,
      borderRadius: `${size * radius / 100}px`,
      background: bg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative', overflow: 'hidden',
      flexShrink: 0,
      boxShadow: '0 4px 12px oklch(0.18 0.02 250 / 0.15)',
    }}>
      <div style={{
        position: 'absolute', inset: 0,
        background: 'radial-gradient(circle at 50% 0%, oklch(0.45 0.06 250 / 0.5) 0%, transparent 65%)',
      }} />
      <div style={{ position: 'relative' }}>{children}</div>
    </div>
  );
}

/* The old Sun-Arch mark — kept here to show "current" state on findings */
function SunArchMark({ size = 32, color = 'currentColor', stroke = 1.5 }) {
  return (
    <svg viewBox="0 0 48 48" width={size} height={size} fill="none"
         stroke={color} strokeWidth={stroke} strokeLinecap="round" strokeLinejoin="round"
         style={{ display: 'block', overflow: 'visible', flexShrink: 0 }}>
      <circle cx="24" cy="8" r="1.8" fill={color} stroke="none" />
      <path d="M9 26 A15 15 0 0 1 39 26" />
      <line x1="9" y1="26" x2="9" y2="29" />
      <line x1="39" y1="26" x2="39" y2="29" />
      <path d="M5 33 Q13 30 20 33 T35 33 Q40 31 43 33" />
      <path d="M7 39 Q14 36 21 39 T36 39 Q40 37.5 41 39" />
    </svg>
  );
}

/* ────────────────────────────────────────────────────────────
   Utility components
   ──────────────────────────────────────────────────────────── */

function PriorityBadge({ p }) {
  const map = {
    P0: { bg: 'oklch(0.95 0.05 25)', fg: 'oklch(0.50 0.18 25)', label: 'P0 · critical' },
    P1: { bg: 'oklch(0.95 0.06 75)', fg: 'oklch(0.50 0.15 75)', label: 'P1 · important' },
    P2: { bg: 'oklch(0.94 0.025 245)', fg: 'oklch(0.45 0.10 245)', label: 'P2 · polish' },
  };
  const s = map[p] || map.P2;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: s.bg, color: s.fg,
      padding: '3px 9px', borderRadius: 100,
      fontSize: 10.5, fontWeight: 700,
      letterSpacing: '0.04em', textTransform: 'uppercase',
      whiteSpace: 'nowrap',
    }}>{s.label}</span>
  );
}

function SurfaceBadge({ name }) {
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 4,
      background: 'oklch(0.95 0.01 75)', color: 'var(--warm-dark)',
      border: '1px solid var(--warm-line)',
      padding: '3px 9px', borderRadius: 100,
      fontSize: 10.5, fontWeight: 600,
      letterSpacing: '0.04em',
    }}>{name}</span>
  );
}

function Status({ kind, children }) {
  const map = {
    ok:    { bg: 'oklch(0.96 0.05 155)', fg: 'oklch(0.42 0.13 155)', icon: '✓' },
    partial:{ bg: 'oklch(0.96 0.06 75)',  fg: 'oklch(0.50 0.15 75)',  icon: '◐' },
    fail:  { bg: 'oklch(0.96 0.05 25)',  fg: 'oklch(0.50 0.18 25)',  icon: '✕' },
    info:  { bg: 'oklch(0.96 0.025 245)',fg: 'oklch(0.45 0.10 245)', icon: '?' },
  };
  const s = map[kind];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      background: s.bg, color: s.fg,
      padding: '3px 10px', borderRadius: 100,
      fontSize: 11, fontWeight: 600,
    }}><span style={{ fontSize: 12 }}>{s.icon}</span>{children}</span>
  );
}

function Section({ id, eyebrow, title, desc, children }) {
  return (
    <section id={id} data-screen-label={title} style={{ marginBottom: 72 }}>
      <div style={{ marginBottom: 28, maxWidth: 720 }}>
        <div className="eyebrow" style={{ marginBottom: 10 }}>{eyebrow}</div>
        <h2 className="font-serif" style={{
          fontSize: 36, lineHeight: 1.12, color: 'var(--warm-darker)',
          marginBottom: 10, fontWeight: 400,
        }}>{title}</h2>
        {desc && <p style={{ color: 'var(--warm-muted)', fontSize: 15, lineHeight: 1.6, textWrap: 'pretty' }}>{desc}</p>}
      </div>
      {children}
    </section>
  );
}

function Finding({ id, priority, surfaces, title, current, target, recommendation, swatch }) {
  return (
    <article style={{
      background: 'white',
      border: '1px solid var(--warm-line)',
      borderRadius: 16,
      padding: 28,
      marginBottom: 16,
    }}>
      {/* header */}
      <div style={{
        display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between',
        gap: 16, marginBottom: 16,
      }}>
        <div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8, flexWrap: 'wrap' }}>
            <span className="font-mono" style={{
              fontSize: 11, color: 'var(--warm-muted)', letterSpacing: '0.1em',
            }}>{id}</span>
            <PriorityBadge p={priority} />
            {surfaces.map(s => <SurfaceBadge key={s} name={s} />)}
          </div>
          <h3 className="font-serif" style={{
            fontSize: 22, lineHeight: 1.2, color: 'var(--warm-darker)', fontWeight: 400,
          }}>{title}</h3>
        </div>
      </div>

      {/* current vs target */}
      {(current || target) && (
        <div style={{
          display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12,
          marginBottom: 18,
        }}>
          <div style={{
            background: 'oklch(0.97 0.012 75)',
            border: '1px solid var(--warm-line)',
            borderRadius: 10, padding: 18,
            minHeight: 140,
          }}>
            <div className="font-mono" style={{ fontSize: 9.5, color: 'oklch(0.50 0.18 25)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 12 }}>
              ✕ Current
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 80 }}>
              {current}
            </div>
          </div>
          <div style={{
            background: 'oklch(0.97 0.025 75)',
            border: '1px solid oklch(0.85 0.06 75)',
            borderRadius: 10, padding: 18,
            minHeight: 140,
            boxShadow: '0 0 0 1px var(--gold)',
          }}>
            <div className="font-mono" style={{ fontSize: 9.5, color: 'var(--gold-deep)', letterSpacing: '0.12em', textTransform: 'uppercase', marginBottom: 12 }}>
              ✓ Target
            </div>
            <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 80 }}>
              {target}
            </div>
          </div>
        </div>
      )}

      <div style={{
        display: 'flex', gap: 14, alignItems: 'flex-start',
        background: 'oklch(0.97 0.012 75)',
        border: '1px dashed var(--warm-line)',
        borderRadius: 10, padding: 16,
      }}>
        <div className="font-mono" style={{
          fontSize: 9, color: 'var(--gold-deep)', letterSpacing: '0.12em',
          textTransform: 'uppercase', flexShrink: 0, marginTop: 2,
        }}>Fix</div>
        <p style={{ fontSize: 13.5, lineHeight: 1.55, color: 'var(--warm-dark)', textWrap: 'pretty' }}>
          {recommendation}
        </p>
      </div>
    </article>
  );
}

/* ────────────────────────────────────────────────────────────
   Mockups — current vs target snippets
   ──────────────────────────────────────────────────────────── */

/* Color swatch row */
function Swatches({ items }) {
  return (
    <div style={{ display: 'flex', gap: 0, borderRadius: 8, overflow: 'hidden' }}>
      {items.map((it, i) => (
        <div key={i} style={{
          background: it.c, padding: '14px 12px',
          minWidth: 70, color: it.fg || 'white',
          fontSize: 10, fontFamily: 'JetBrains Mono, monospace',
          lineHeight: 1.3,
        }}>
          <div style={{ fontWeight: 600, opacity: 0.9 }}>{it.l}</div>
          <div style={{ opacity: 0.7, marginTop: 2 }}>{it.h}</div>
        </div>
      ))}
    </div>
  );
}

/* Splash header — current state (light gradient + blue CTA) */
function CurrentSplashHeader() {
  return (
    <div style={{
      borderRadius: 8, overflow: 'hidden',
      border: '1px solid var(--warm-line)',

      width: '100%',
    }}>
      <div style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <SunArchMark size={18} color="var(--warm-darker)" stroke={1.7} />
          <span className="wordmark" style={{ fontSize: 14, color: 'var(--warm-darker)' }}>DreamRiver</span>
        </div>
        <span style={{ fontSize: 9, color: 'var(--warm-muted)' }}>Coming June 2026</span>
      </div>
      <div style={{ padding: '14px 14px 18px' }}>
        <div className="font-serif" style={{ fontSize: 14, color: 'var(--warm-darker)', maxWidth: 180, marginBottom: 10, lineHeight: 1.2 }}>
          Discover what God is saying through your dreams.
        </div>
        <span style={{ padding: '5px 10px', background: 'var(--old-blue)', color: 'white', borderRadius: 100, fontSize: 9, fontWeight: 600 }}>Join Waitlist</span>
      </div>
    </div>
  );
}

function TargetSplashHeader() {
  return (
    <div style={{
      borderRadius: 8, overflow: 'hidden',
      border: '1px solid var(--warm-line)',
      background: 'linear-gradient(175deg, var(--night) 0%, var(--night-deep) 100%)',
      width: '100%',
    }}>
      <div style={{ padding: '10px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
          <MoonwaterMark size={18} moonColor="var(--gold)" waveTop="var(--cream)" waveBottom="var(--gold)" />
          <span className="wordmark" style={{ fontSize: 14, color: 'var(--cream)' }}>DreamRiver</span>
        </div>
        <span style={{ fontSize: 9, color: 'oklch(0.7 0.04 75)' }}>Coming June 2026</span>
      </div>
      <div style={{ padding: '14px 14px 18px' }}>
        <div className="font-serif" style={{ fontSize: 14, color: 'var(--cream)', maxWidth: 180, marginBottom: 10, lineHeight: 1.2 }}>
          Discover what God is saying through your dreams.
        </div>
        <span style={{ padding: '5px 10px', background: 'var(--gold)', color: 'var(--night-deep)', borderRadius: 100, fontSize: 9, fontWeight: 700 }}>Join Waitlist</span>
      </div>
    </div>
  );
}

/* Dashboard sidebar — current */
function CurrentDashSidebar() {
  return (
    <div style={{
      width: 160,
      background: 'oklch(0.99 0.004 75)',
      border: '1px solid var(--warm-line)',
      borderRadius: 8, padding: '12px 10px',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 12 }}>
        <SunArchMark size={18} color="var(--old-blue)" stroke={1.7} />
        <span className="wordmark" style={{ fontSize: 13 }}>DreamRiver</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        <div style={{ padding: '5px 8px', background: 'var(--old-blue-pale)', color: 'var(--old-blue)', borderRadius: 5, fontSize: 10, fontWeight: 600 }}>● Account</div>
        <div style={{ padding: '5px 8px', color: 'var(--warm-muted)', fontSize: 10 }}>○ Preferences</div>
        <div style={{ padding: '5px 8px', color: 'var(--warm-muted)', fontSize: 10 }}>○ Analysis</div>
      </div>
    </div>
  );
}

function TargetDashSidebar() {
  return (
    <div style={{
      width: 160,
      background: 'var(--cream-soft)',
      border: '1px solid var(--warm-line)',
      borderRadius: 8, padding: '12px 10px',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 12 }}>
        <AppIcon size={22} radius={22}>
          <MoonwaterMark size={14} moonColor="var(--gold)" waveTop="var(--cream)" waveBottom="var(--gold)" />
        </AppIcon>
        <span className="wordmark" style={{ fontSize: 13 }}>DreamRiver</span>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        <div style={{ padding: '5px 8px', background: 'oklch(0.95 0.05 75)', color: 'var(--gold-deep)', borderRadius: 5, fontSize: 10, fontWeight: 600, borderLeft: '2px solid var(--gold)' }}>● Account</div>
        <div style={{ padding: '5px 8px', color: 'var(--warm-muted)', fontSize: 10 }}>○ Preferences</div>
        <div style={{ padding: '5px 8px', color: 'var(--warm-muted)', fontSize: 10 }}>○ Analysis</div>
      </div>
    </div>
  );
}

/* CTA button comparison */
function CtaPair({ kind = 'current' }) {
  if (kind === 'current') {
    return (
      <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
        <span style={{ padding: '7px 14px', background: 'var(--old-blue)', color: 'white', borderRadius: 6, fontSize: 12, fontWeight: 600 }}>Get Interpretation</span>
        <span style={{ padding: '7px 14px', border: '1px solid var(--warm-line)', borderRadius: 6, fontSize: 12, fontWeight: 500 }}>Cancel</span>
      </div>
    );
  }
  return (
    <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
      <span style={{ padding: '7px 14px', background: 'var(--gold)', color: 'var(--night-deep)', borderRadius: 6, fontSize: 12, fontWeight: 700 }}>Get Interpretation</span>
      <span style={{ padding: '7px 14px', border: '1px solid var(--warm-line)', borderRadius: 6, fontSize: 12, fontWeight: 500 }}>Cancel</span>
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   App
   ──────────────────────────────────────────────────────────── */
function App() {
  return (
    <div style={{ maxWidth: 1180, margin: '0 auto', padding: '56px 40px 120px' }}>

      {/* ── Header ─────────────────────────────────────────────── */}
      <header style={{ marginBottom: 56 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 40 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <AppIcon size={32} radius={22}>
              <MoonwaterMark size={20} />
            </AppIcon>
            <span className="wordmark" style={{ fontSize: 22 }}>DreamRiver</span>
          </div>
          <span className="font-mono" style={{ fontSize: 10.5, color: 'var(--warm-muted)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            Brand Audit · v2 Moonwater · May 2026
          </span>
        </div>

        <div className="eyebrow" style={{ marginBottom: 12 }}>Audit</div>
        <h1 className="font-serif" style={{ fontSize: 64, lineHeight: 1.04, color: 'var(--warm-darker)', maxWidth: 860, marginBottom: 18, fontWeight: 400, textWrap: 'balance' }}>
          Where the app stands against the new brand.
        </h1>
        <p style={{ fontSize: 16, lineHeight: 1.6, color: 'var(--warm-muted)', maxWidth: 680, textWrap: 'pretty' }}>
          Surface-by-surface walkthrough of <span className="wordmark" style={{ fontSize: 16, color: 'var(--warm-darker)' }}>DreamRiver</span> against the v2 Moonwater system. What's already aligned, what's mid-flight, and what still needs to move. 14 findings, ranked.
        </p>
      </header>

      {/* ── Exec summary ──────────────────────────────────────── */}
      <section style={{
        background: 'linear-gradient(165deg, var(--night) 0%, var(--night-deep) 100%)',
        borderRadius: 18, padding: '40px 40px',
        marginBottom: 48, color: 'var(--cream)',
        position: 'relative', overflow: 'hidden',
      }}>
        <div style={{ position: 'absolute', top: -60, right: -60, opacity: 0.18 }}>
          <MoonwaterMark size={240} moonColor="var(--gold)" waveTop="var(--cream)" waveBottom="var(--gold)" />
        </div>

        <div style={{ position: 'relative', display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 32 }}>
          <div>
            <div className="font-mono" style={{ fontSize: 10.5, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'oklch(0.7 0.06 75)', marginBottom: 8 }}>Headline</div>
            <div className="font-serif" style={{ fontSize: 26, lineHeight: 1.18, color: 'var(--cream)' }}>
              The wordmark is right. The mark and the palette aren't.
            </div>
          </div>
          <div>
            <div className="font-mono" style={{ fontSize: 10.5, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'oklch(0.7 0.06 75)', marginBottom: 8 }}>Aligned</div>
            <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 6, fontSize: 13.5, color: 'oklch(0.85 0.03 75)' }}>
              <li>✓ Cormorant Garamond italic wordmark</li>
              <li>✓ DM Serif Display / DM Sans typography</li>
              <li>✓ Warm parchment surface</li>
              <li>✓ Title-case treatment</li>
            </ul>
          </div>
          <div>
            <div className="font-mono" style={{ fontSize: 10.5, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'oklch(0.7 0.06 75)', marginBottom: 8 }}>Diverged</div>
            <ul style={{ listStyle: 'none', display: 'flex', flexDirection: 'column', gap: 6, fontSize: 13.5, color: 'oklch(0.85 0.03 75)' }}>
              <li>✕ Sun-Arch mark used everywhere</li>
              <li>✕ Sacred-blue primary (now gold)</li>
              <li>✕ No app icon / squircle system</li>
              <li>✕ Splash uses light gradient, not night</li>
            </ul>
          </div>
        </div>

        <div style={{
          marginTop: 32, paddingTop: 24,
          borderTop: '1px solid oklch(0.4 0.04 250 / 0.6)',
          display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 24,
        }}>
          {[
            { n: '14', l: 'findings total' },
            { n: '4',  l: 'P0 · critical' },
            { n: '7',  l: 'P1 · important' },
            { n: '3',  l: 'P2 · polish' },
          ].map(s => (
            <div key={s.l}>
              <div className="font-serif" style={{ fontSize: 36, color: 'var(--gold)', lineHeight: 1 }}>{s.n}</div>
              <div className="font-mono" style={{ fontSize: 11, color: 'oklch(0.75 0.04 75)', marginTop: 6, letterSpacing: '0.1em', textTransform: 'uppercase' }}>{s.l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* ── Brand reference card ──────────────────────────────── */}
      <section style={{
        background: 'white',
        border: '1px solid var(--warm-line)',
        borderRadius: 16, padding: 32,

              <span style={{ fontSize: 13.5, color: 'var(--warm-darker)', fontWeight: 500 }}>{row.t}</span>
              <span style={{ fontSize: 12, color: 'var(--warm-muted)' }}><strong style={{ color: 'var(--warm-dark)', fontWeight: 600 }}>Effort:</strong> {row.e}</span>
              <span style={{ fontSize: 12, color: 'var(--warm-muted)' }}><strong style={{ color: 'var(--warm-dark)', fontWeight: 600 }}>Impact:</strong> {row.i}</span>
            </div>
          ))}
        </div>
      </Section>

      <footer style={{
        marginTop: 60, paddingTop: 28, borderTop: '1px solid var(--warm-line)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        fontSize: 12, color: 'var(--warm-muted)',
      }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <AppIcon size={20} radius={22}><MoonwaterMark size={13} /></AppIcon>
          <span className="wordmark" style={{ fontSize: 15, color: 'var(--warm-darker)' }}>DreamRiver</span>
        </div>
        <span className="font-mono" style={{ letterSpacing: '0.1em', textTransform: 'uppercase' }}>Brand Audit · v2 Moonwater · May 2026</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
