    --warm-paper:   oklch(0.97 0.012 75);
    --warm-cream:   oklch(0.955 0.015 75);

    --warm-dark:    oklch(0.22 0.02 250);

    background: linear-gradient(90deg, transparent, var(--warm-line), transparent);

  .checker {
    background-image:
      linear-gradient(45deg, oklch(0.92 0.01 75) 25%, transparent 25%),
      linear-gradient(-45deg, oklch(0.92 0.01 75) 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, oklch(0.92 0.01 75) 75%),
      linear-gradient(-45deg, transparent 75%, oklch(0.92 0.01 75) 75%);

<div id="root"></div>

<script type="text/babel" src="tweaks-panel.jsx"></script>

<script type="text/babel">
const { useState } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "crescentFullness": 9,
  "crescentTilt": 15,
  "waveStyle": "cream-gold",
  "wavePhase": "aligned",
  "containerRadius": 22
}/*EDITMODE-END*/;

/* ────────────────────────────────────────────────────────────
   The Moonwater Mark
   A waxing crescent above two gentle waves.
   - crescentFullness: inner-arc rx (smaller = thinner crescent)
   - crescentTilt: degrees of rotation
   - waveColors: 'cream-gold' | 'all-cream' | 'all-gold'
   ──────────────────────────────────────────────────────────── */
function MoonwaterMark({
  size = 80,
  moonColor = 'var(--gold)',
  waveTop = 'var(--cream)',
  waveBottom = 'var(--gold)',
  stroke = 2.5,
  crescentFullness = 9,
  crescentTilt = 15,
  invertWaves = false,
}) {
  // viewBox 64×64. Crescent sits in the upper third; two parallel waves
  // sit in the lower half. Cream above, gold below — not crossing.
  const cf = crescentFullness; // typical 7..11
  const crescent = `M32 11 A14 14 0 1 0 32 39 A${cf} 14 0 1 1 32 11 Z`;
  const sw = (stroke * size) / 80;
  const swClamped = Math.max(1.4, Math.min(3.2, sw));

  const topWave    = "M10 48 C 18 42, 22 42, 30 48 C 38 54, 42 54, 54 48";
  const bottomWave = invertWaves
    ? "M14 56 C 22 62, 26 62, 32 56 C 38 50, 42 50, 50 56"   // crossed (alternative)
    : "M14 56 C 22 50, 26 50, 32 56 C 38 62, 42 62, 50 56";  // aligned (default, matches reference)

  return (
    <svg viewBox="0 0 64 64" width={size} height={size} fill="none"
         style={{ display: 'block', overflow: 'visible' }}>
      <g transform={`rotate(${crescentTilt} 32 25)`}>
        <path d={crescent} fill={moonColor} />
      </g>
      <path d={bottomWave} stroke={waveBottom} strokeWidth={swClamped} strokeLinecap="round" />
      <path d={topWave}    stroke={waveTop}    strokeWidth={swClamped} strokeLinecap="round" />
    </svg>
  );
}

/* App-icon container — the squircle. Part of the identity for installable surfaces. */
function AppIcon({
  size = 120,
  radius = 22,            // border-radius in % of size (Apple squircle ≈ 22.37%)
  bg = 'var(--night)',
  showHighlight = true,
  children,
}) {
  return (
    <div style={{
      width: size, height: size,
      borderRadius: `${size * radius / 100}px`,
      background: bg,
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      position: 'relative', overflow: 'hidden',
      boxShadow: '0 8px 24px oklch(0.18 0.02 250 / 0.18), 0 2px 6px oklch(0.18 0.02 250 / 0.08)',
    }}>
      {showHighlight && (
        <div style={{
          position: 'absolute', inset: 0,
          background: 'radial-gradient(circle at 50% 0%, oklch(0.45 0.06 250 / 0.6) 0%, transparent 65%)',
          pointerEvents: 'none',
        }} />
      )}
      <div style={{ position: 'relative' }}>{children}</div>
    </div>
  );
}

/* Wordmark */
function Wordmark({ size = 32, color = 'var(--warm-darker)' }) {
  return (
    <span className="wordmark" style={{
      fontSize: size, lineHeight: 1, color, whiteSpace: 'nowrap',
    }}>DreamRiver</span>
  );
}

/* Horizontal lockup — mark + wordmark, no container */
function Lockup({ markSize = 36, wordSize = 30, gap = 12, color = 'var(--warm-darker)', tweaks, on = 'light' }) {
  // Color rules: on dark surfaces moon = gold, top wave = cream, bottom = gold.
  // On light surfaces moon = night, top wave = night, bottom = gold.
  const palette = on === 'dark'
    ? { moon: 'var(--gold)', top: 'var(--cream)', bottom: 'var(--gold)' }
    : { moon: 'var(--night)', top: 'var(--night)', bottom: 'var(--gold)' };
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap, color }}>
      <MoonwaterMark size={markSize}
                     moonColor={palette.moon}
                     waveTop={palette.top}
                     waveBottom={palette.bottom}
                     crescentFullness={tweaks?.crescentFullness ?? 9}
                     crescentTilt={tweaks?.crescentTilt ?? 15}
                     invertWaves={(tweaks?.wavePhase ?? 'aligned') === 'inverted'} />
      <Wordmark size={wordSize} color={color} />
    </div>
  );
}

/* Contained lockup — uses the squircle */
function ContainedLockup({ iconSize = 56, wordSize = 28, gap = 16, color = 'var(--warm-darker)', tweaks }) {
  return (
    <div style={{ display: 'inline-flex', alignItems: 'center', gap, color }}>
      <AppIcon size={iconSize} radius={tweaks?.containerRadius ?? 22}>
        <MoonwaterMark size={iconSize * 0.65}
                       moonColor="var(--gold)"
                       waveTop="var(--cream)"
                       waveBottom="var(--gold)"
                       crescentFullness={tweaks?.crescentFullness ?? 9}
                       crescentTilt={tweaks?.crescentTilt ?? 15}
                       invertWaves={(tweaks?.wavePhase ?? 'aligned') === 'inverted'} />
      </AppIcon>
      <Wordmark size={wordSize} color={color} />
    </div>
  );
}

/* Section helper */
function Section({ eyebrow, title, desc, children, style = {} }) {
  return (
    <section data-screen-label={title} style={{ marginBottom: 72, ...style }}>
      <div style={{ marginBottom: 28, maxWidth: 720 }}>
        <div className="eyebrow" style={{ marginBottom: 10 }}>{eyebrow}</div>
        <h2 className="font-serif" style={{
          fontSize: 34, lineHeight: 1.12, color: 'var(--warm-darker)',
          marginBottom: 10, fontWeight: 400,
        }}>{title}</h2>
        {desc && <p style={{ color: 'var(--warm-muted)', fontSize: 15, lineHeight: 1.55, textWrap: 'pretty' }}>{desc}</p>}
      </div>
      {children}
    </section>
  );
}

function Tile({ children, label, sub, bg = 'oklch(1 0 0 / 0.7)', padding = 28, style = {} }) {
  // Auto-detect dark backgrounds (named night tokens) so labels stay readable.
  const isDark = typeof bg === 'string' && /var\(--night|0e1a30|08111f|1a2748|oklch\(0\.[01]/i.test(bg);
  const labelColor = isDark ? 'var(--cream)' : 'var(--warm-dark)';
  const subColor   = isDark ? 'oklch(0.72 0.04 75)' : 'var(--warm-muted)';
  const borderColor = isDark ? 'oklch(0.55 0.04 75 / 0.3)' : 'var(--warm-line)';
  return (
    <div style={{
      background: bg,
      border: '1px solid var(--warm-line)',
      borderRadius: 14,
      padding,
      display: 'flex',
      flexDirection: 'column',
      ...style,
    }}>
      <div style={{
        flex: 1,
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        minHeight: 0,
      }}>
        {children}
      </div>
      {(label || sub) && (
        <div style={{ marginTop: 20, paddingTop: 16, borderTop: `1px dashed ${borderColor}` }}>
          {label && <div style={{ fontSize: 12, fontWeight: 600, color: labelColor }}>{label}</div>}
          {sub && <div className="font-mono" style={{ fontSize: 10.5, color: subColor, marginTop: 4 }}>{sub}</div>}
        </div>
      )}
    </div>
  );
}

/* ────────────────────────────────────────────────────────────
   Application mockups
   ──────────────────────────────────────────────────────────── */

function SplashHeaderMock({ tweaks }) {
  return (
    <div style={{
      borderRadius: 12, overflow: 'hidden',
      border: '1px solid var(--warm-line)',
      background: 'linear-gradient(175deg, var(--night) 0%, var(--night-deep) 100%)',

      <div style={{
        padding: '14px 20px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <Lockup markSize={26} wordSize={20} gap={10} color="var(--cream)" tweaks={tweaks} on="dark" />
        <span style={{ fontSize: 11.5, color: 'oklch(0.7 0.04 75)' }}>Coming June 2026</span>
      </div>
      <div style={{ padding: '40px 24px 50px', textAlign: 'left' }}>
        <div style={{
          display: 'inline-block', padding: '4px 12px', borderRadius: 100,
          background: 'oklch(0.4 0.1 80 / 0.25)',
          border: '1px solid oklch(0.65 0.12 75 / 0.4)',
          fontSize: 10, fontWeight: 600, color: 'var(--gold-light)',
          marginBottom: 16,
        }}>✦ Launching June 1, 2026</div>
        <div className="font-serif" style={{ fontSize: 24, lineHeight: 1.18, color: 'var(--cream)', maxWidth: 320, marginBottom: 16 }}>

        </div>
        <div style={{

          borderRadius: 100, padding: '6px 6px 6px 14px',
        }}>
          <span style={{ fontSize: 11, color: 'oklch(0.7 0.03 75)' }}>your@email.com</span>
          <span style={{
            padding: '6px 12px', background: 'var(--gold)', color: 'var(--night-deep)',
            borderRadius: 100, fontSize: 11, fontWeight: 700,
          }}>Join Waitlist</span>

}

function DashboardHeaderMock({ tweaks }) {
  return (
    <div style={{
      borderRadius: 12, overflow: 'hidden',

    }}>

        <div style={{ flex: 1, display: 'flex', gap: 18 }}>
          {['Journal', 'Library', 'Insights', 'Settings'].map((l, i) => (
            <span key={l} style={{

              paddingBottom: 4,
            }}>{l}</span>
          ))}
        </div>
        <div style={{
          width: 24, height: 24, borderRadius: '50%',
          background: 'linear-gradient(135deg, var(--night-soft), var(--gold))',
        }} />
      </div>
      <div style={{ padding: 20, background: 'var(--warm-cream)' }}>
        <div className="font-serif" style={{ fontSize: 22, color: 'var(--warm-darker)' }}>Welcome back.</div>
        <div style={{ fontSize: 12, color: 'var(--warm-muted)', marginTop: 4 }}>14 dreams journaled this month</div>
        <div style={{ display: 'flex', gap: 8, marginTop: 14 }}>
          {[1, 2, 3].map(i => (
            <div key={i} style={{
              flex: 1, height: 64, background: 'white',

  return (
    <div style={{
      background: 'white',
      border: '1px solid var(--warm-line)',
      borderRadius: 14,
      padding: 14,
      display: 'flex', gap: 12,
      maxWidth: 360,
    }}>
      <AppIcon size={40} radius={tweaks?.containerRadius ?? 22}>
        <MoonwaterMark size={28} moonColor="var(--gold)" waveTop="var(--cream)" waveBottom="var(--gold)"
                       crescentFullness={tweaks?.crescentFullness ?? 9} />
      </AppIcon>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', marginBottom: 2 }}>
          <span className="wordmark" style={{ fontSize: 14, color: 'var(--warm-dark)' }}>DreamRiver</span>

        </div>
        <div style={{ fontSize: 12, color: 'var(--warm-dark)', fontWeight: 600, marginBottom: 2 }}>
          Your dream has been interpreted
        </div>
        <div style={{ fontSize: 11.5, color: 'var(--warm-muted)', lineHeight: 1.4 }}>

        </div>

}

function SocialCardMock({ tweaks }) {
  return (
    <div style={{
      borderRadius: 14, overflow: 'hidden',
      border: '1px solid var(--warm-line)',
      background: 'linear-gradient(170deg, var(--night-deep) 0%, var(--night-soft) 100%)',
      position: 'relative',
    }}>
      {/* subtle moon glow in corner */}
      <div style={{
        position: 'absolute', top: -60, right: -60,
        width: 240, height: 240, borderRadius: '50%',
        background: 'radial-gradient(circle, oklch(0.5 0.12 75 / 0.3) 0%, transparent 60%)',
      }} />
      <div style={{ padding: '40px 36px', position: 'relative' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 24 }}>
          <MoonwaterMark size={32} moonColor="var(--gold)" waveTop="var(--cream)" waveBottom="var(--gold)"
                         crescentFullness={tweaks?.crescentFullness ?? 9} />

        </div>

/* ────────────────────────────────────────────────────────────
   App
   ──────────────────────────────────────────────────────────── */
function App() {
  const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Wave color tweak — applies to lockups+icons that read it
  const waveColors = (() => {
    if (tweaks.waveStyle === 'all-cream') return { top: 'var(--cream)', bottom: 'var(--cream)' };
    if (tweaks.waveStyle === 'all-gold') return { top: 'var(--gold)', bottom: 'var(--gold)' };
    return { top: 'var(--cream)', bottom: 'var(--gold)' }; // default
  })();

  return (
    <div style={{ maxWidth: 1200, margin: '0 auto', padding: '56px 40px 120px' }}>

      {/* ── Header ─────────────────────────────────────────────── */}
      <header style={{ marginBottom: 64 }}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 40 }}>
          <Lockup markSize={28} wordSize={24} tweaks={tweaks} on="light" />
          <span className="font-mono" style={{ fontSize: 10.5, color: 'var(--warm-muted)', letterSpacing: '0.1em', textTransform: 'uppercase' }}>
            Brand · v2 · Moonwater · May 2026
          </span>
        </div>

        <div className="eyebrow" style={{ marginBottom: 12 }}>Visual Identity</div>
        <h1 className="font-serif" style={{ fontSize: 60, lineHeight: 1.05, color: 'var(--warm-darker)', maxWidth: 880, marginBottom: 18, fontWeight: 400, textWrap: 'balance' }}>
          A waxing crescent rising over still water.
        </h1>
        <p style={{ fontSize: 16, lineHeight: 1.55, color: 'var(--warm-muted)', maxWidth: 640 }}>
          The mark is a moon above two gentle waves, set against midnight. Anchored by a squircle for installable surfaces; freed for inline use. Gold for the moon and the second wave; cream for the first wave; night for everything around it.
        </p>
      </header>

      {/* ── Hero icon ──────────────────────────────────────────── */}
      <section data-screen-label="Hero icon" style={{
        background: 'linear-gradient(165deg, var(--night-deep) 0%, var(--night-soft) 100%)',
        borderRadius: 24, padding: '88px 40px',
        textAlign: 'center', marginBottom: 64,
        position: 'relative', overflow: 'hidden',
      }}>
        {/* corner moon glow */}
        <div style={{ position: 'absolute', top: -120, left: -120, width: 360, height: 360, borderRadius: '50%',
                      background: 'radial-gradient(circle, oklch(0.5 0.1 75 / 0.35) 0%, transparent 60%)' }} />
        <div style={{ position: 'absolute', bottom: -100, right: -80, width: 280, height: 280, borderRadius: '50%',
                      background: 'radial-gradient(circle, oklch(0.4 0.08 245 / 0.35) 0%, transparent 60%)' }} />

        <div style={{ position: 'relative' }}>
          <AppIcon size={208} radius={tweaks.containerRadius}>
            <MoonwaterMark size={136} moonColor="var(--gold)" waveTop={waveColors.top} waveBottom={waveColors.bottom}
                           crescentFullness={tweaks.crescentFullness} crescentTilt={tweaks.crescentTilt} />
          </AppIcon>
          <div style={{ marginTop: 36 }}>
            <Wordmark size={68} color="var(--cream)" />
          </div>
          <div className="font-mono" style={{
            marginTop: 20, fontSize: 11, letterSpacing: '0.18em',
            textTransform: 'uppercase', color: 'oklch(0.7 0.04 75)',
          }}>
            Dreams · Scripture · Stillness
          </div>
        </div>
      </section>

      {/* ── Mark anatomy ───────────────────────────────────────── */}
      <Section eyebrow="01 — The Mark"
               title="Moon · Wave · Wave"
               desc="Three elements on a 64×64 grid. The waxing crescent sits in the upper third, the cream wave under it as a horizon, the gold wave below as an undertow. The container is a squircle in midnight — Apple-spec radius (~22.4%) so the icon sits naturally on iOS.">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 20 }}>
          <Tile label="In container" sub="primary application · 208×208" bg="oklch(0.95 0.015 75)" padding={36}>
            <AppIcon size={180} radius={tweaks.containerRadius}>
              <MoonwaterMark size={118} moonColor="var(--gold)" waveTop={waveColors.top} waveBottom={waveColors.bottom}
                             crescentFullness={tweaks.crescentFullness} crescentTilt={tweaks.crescentTilt} />
            </AppIcon>
          </Tile>
          <Tile label="Free-floating" sub="header use · light bg" bg="var(--warm-cream)" padding={36}>
            <MoonwaterMark size={150} moonColor="var(--night)" waveTop="var(--night)" waveBottom="var(--gold)"
                           crescentFullness={tweaks.crescentFullness} crescentTilt={tweaks.crescentTilt} />
          </Tile>
          <Tile label="Free-floating reverse" sub="header use · dark bg" bg="var(--night-deep)" padding={36}>
            <MoonwaterMark size={150} moonColor="var(--gold)" waveTop={waveColors.top} waveBottom={waveColors.bottom}
                           crescentFullness={tweaks.crescentFullness} crescentTilt={tweaks.crescentTilt} />
          </Tile>
        </div>

        {/* anatomy diagram */}
        <div className="card" style={{ marginTop: 20, padding: 36, background: 'oklch(0.97 0.012 75)', border: '1px solid var(--warm-line)', borderRadius: 14, display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 32 }}>
          <div style={{ position: 'relative', display: 'flex', alignItems: 'center', justifyContent: 'center', minHeight: 240 }}>
            <MoonwaterMark size={200} moonColor="var(--night)" waveTop="var(--night)" waveBottom="var(--gold)"
                           crescentFullness={tweaks.crescentFullness} crescentTilt={tweaks.crescentTilt} />
            {/* callouts */}
            <div style={{ position: 'absolute', top: 18, right: 6, fontSize: 10, color: 'var(--gold-deep)', display: 'flex', alignItems: 'center', gap: 6 }}>
              <span style={{ width: 22, height: 1, background: 'var(--gold-deep)' }} />

            <div><span style={{ color: 'var(--warm-muted)' }}>color.gold        </span>= #D4A247 · oklch(0.72 0.14 75)</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>color.gold.light  </span>= #E6C073</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>color.gold.deep   </span>= #B08436</div>
            <div className="divider" style={{ margin: '12px 0' }} />
            <div><span style={{ color: 'var(--warm-muted)' }}>mark.viewBox      </span>= 64 × 64</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>mark.crescent     </span>= waxing · fullness 9 · tilt 0°</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>mark.wave.stroke  </span>= 2.5 (scaled, clamped 1.4–3.2)</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>container.radius  </span>= 22% (iOS squircle)</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>container.bg      </span>= var(--night)</div>
            <div className="divider" style={{ margin: '12px 0' }} />
            <div><span style={{ color: 'var(--warm-muted)' }}>wordmark.font     </span>= 'Cormorant Garamond', Georgia, serif</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>wordmark.style    </span>= italic · 500 · letter-spacing 0.005em</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>headline.font     </span>= 'DM Serif Display'</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>body.font         </span>= 'DM Sans'</div>
            <div><span style={{ color: 'var(--warm-muted)' }}>mono.font         </span>= 'JetBrains Mono'</div>
          </div>
        </div>
      </Section>

      <footer style={{
        marginTop: 80, paddingTop: 28, borderTop: '1px solid var(--warm-line)',
        display: 'flex', justifyContent: 'space-between', alignItems: 'center',
        fontSize: 12, color: 'var(--warm-muted)',
      }}>
        <Lockup markSize={20} wordSize={16} gap={8} tweaks={tweaks} on="light" />
        <span className="font-mono" style={{ letterSpacing: '0.1em', textTransform: 'uppercase' }}>brand · v2 · moonwater · 2026</span>
      </footer>

      {/* ── Tweaks ─────────────────────────────────────────────── */}
      <TweaksPanel>
        <TweakSection label="Crescent">
          <TweakSlider label="Fullness" tweakKey="crescentFullness"
                       min={5} max={12} step={1}
                       value={tweaks.crescentFullness}
                       onChange={v => setTweak('crescentFullness', v)} />
          <TweakSlider label="Tilt °" tweakKey="crescentTilt"
                       min={-20} max={20} step={2}
                       value={tweaks.crescentTilt}
                       onChange={v => setTweak('crescentTilt', v)} />
        </TweakSection>
        <TweakSection label="Waves">
          <TweakRadio label="Phase"
                      tweakKey="wavePhase"
                      value={tweaks.wavePhase}
                      onChange={v => setTweak('wavePhase', v)}
                      options={[
                        { value: 'aligned', label: 'Stacked' },
                        { value: 'inverted', label: 'Crossed' },
                      ]} />
          <TweakRadio label="Color pair"
                      tweakKey="waveStyle"
                      value={tweaks.waveStyle}
                      onChange={v => setTweak('waveStyle', v)}
                      options={[
                        { value: 'cream-gold', label: 'Cream + Gold' },
                        { value: 'all-cream', label: 'All cream' },
                        { value: 'all-gold', label: 'All gold' },
                      ]} />
        </TweakSection>
        <TweakSection label="Container">
          <TweakSlider label="Radius %" tweakKey="containerRadius"
                       min={15} max={30} step={1}
                       value={tweaks.containerRadius}
                       onChange={v => setTweak('containerRadius', v)} />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

/* Helper: refinement before/after card */
function RefinementCard({ n, title, note, before, after, beforeLabel, afterLabel, ground = 'var(--night)' }) {
  return (
    <div style={{
      background: 'white', border: '1px solid var(--warm-line)',
      borderRadius: 14, padding: 24,
    }}>
      <div style={{ display: 'flex', gap: 12, alignItems: 'baseline', marginBottom: 14 }}>
        <span className="font-mono" style={{ fontSize: 10, color: 'var(--gold-deep)', letterSpacing: '0.14em' }}>
          {n}
        </span>
        <div className="font-serif" style={{ fontSize: 18, color: 'var(--warm-darker)', lineHeight: 1.15 }}>
          {title}
        </div>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 16 }}>
        <div style={{
          background: ground, borderRadius: 10, padding: 22,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          minHeight: 140, position: 'relative',
        }}>
          {before}
          <span className="font-mono" style={{
            position: 'absolute', bottom: 6, left: 8, fontSize: 9,
            color: ground.includes('night') ? 'oklch(0.65 0.04 75)' : 'var(--warm-muted)',
          }}>{beforeLabel}</span>
        </div>
        <div style={{
          background: ground, borderRadius: 10, padding: 22,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          minHeight: 140, position: 'relative',
          boxShadow: '0 0 0 2px var(--gold)',
        }}>
          {after}
          <span className="font-mono" style={{
            position: 'absolute', bottom: 6, left: 8, fontSize: 9,
            color: ground.includes('night') ? 'var(--gold-light)' : 'var(--gold-deep)',
          }}>{afterLabel} ✓</span>
        </div>
      </div>
      <p style={{ fontSize: 12.5, lineHeight: 1.55, color: 'var(--warm-muted)', textWrap: 'pretty' }}>
        {note}
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
